name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**/*.md']
  pull_request:
    branches: [main]
    paths-ignore: ['**/*.md']
  workflow_dispatch:

jobs:
  version-parity:
    name: Version parity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Backstop for review finding #6: the assembly version (Directory.Build.props)
      # and the manifest version (build.yaml) must agree. scripts/set-version.sh
      # writes both together; this fails the build if they ever drift.
      - name: Check version parity
        run: ./scripts/check-version-parity.sh

  build-test:
    name: Build + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.JellyRock.sln

      # Build enforces the analyzer suite (StyleCop + MultithreadingAnalyzer + AllEnabledByDefault)
      # with TreatWarningsAsErrors — this is the mechanical review gate.
      - name: Build
        run: dotnet build Jellyfin.Plugin.JellyRock.sln -c Release --no-restore

      - name: Test
        run: dotnet test Jellyfin.Plugin.JellyRock.Tests/Jellyfin.Plugin.JellyRock.Tests.csproj -c Release --no-build --verbosity normal
