overview: "Server-side companion for the JellyRock Roku client."
description: >
  Makes the JellyRock Roku app a remote-control ("Play On") target on HTTPS servers,
  where Roku's lack of socket TLS rules out Jellyfin's native session WebSocket. The
  plugin exposes an authenticated HTTP long-poll command channel JellyRock consumes over
  TLS. Named for the companion role so future server-assisted JellyRock features can live
  in the same plugin.
