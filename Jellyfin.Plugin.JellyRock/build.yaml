overview: "Server-side companion for the JellyRock Roku app (Play On casting and remote control)."
imageUrl: "https://jellyrock.github.io/jellyfin-plugin-jellyrock/jellyrock.png"
description: >
  The server-side companion for the JellyRock Roku app, and the home for its
  server-assisted features as they grow. Today it makes JellyRock a "Play On" cast and
  remote-control target on HTTPS Jellyfin servers: cast from the Jellyfin web or mobile
  app to your Roku, then play, pause, and seek from your phone. Because Roku cannot open a
  secure socket (wss://), JellyRock relies on this plugin to receive those commands over
  TLS, making it the only Roku client for Jellyfin with Play On and remote-control
  support. Requires JellyRock v2.23.0 or newer.
category: "General"
