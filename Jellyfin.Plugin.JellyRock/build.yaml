overview: "Server-side companion for the JellyRock Roku app on HTTPS servers: Play On casting and remote control, plus fast session cleanup and an accurate resume position when the app is closed with the Home button during video playback."
imageUrl: "https://jellyrock.github.io/jellyfin-plugin-jellyrock/jellyrock.png"
description: >
  The server-side companion for the JellyRock Roku app, and the home for its
  server-assisted features as they grow. Both features address limitations that exist
  only on HTTPS servers, where Roku cannot open a secure socket (wss://). First, on HTTPS
  it makes JellyRock a "Play On" cast and remote-control target: cast from the Jellyfin
  web or mobile app to your Roku, then play, pause, and seek from your phone, making it
  the only Roku client for Jellyfin with Play On support (requires JellyRock v2.23.0 or
  newer). Second, faster and position-accurate cleanup of abandoned playback: when you
  press Home on the Roku mid-video the app cannot tell the server it stopped, so on HTTPS
  the session lingers for 5-10 minutes with the transcode still running and, worse,
  Jellyfin keeps advancing the saved position after the app is gone, so it would resume
  you minutes ahead of where you stopped. The plugin detects the closed app within about
  a minute, stops the transcode, and saves the resume point where you actually stopped.
  On plain HTTP neither feature is needed, since JellyRock uses Jellyfin's native session
  socket directly.
category: "General"
